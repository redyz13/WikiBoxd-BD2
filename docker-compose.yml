services:
  mongo:
    image: mongo:8
    container_name: wikiboxd-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: wikiboxd-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/
    depends_on:
      - mongo

volumes:
  mongo_data: